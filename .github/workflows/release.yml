name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Sync version to all packages
        run: |
          echo "${{ steps.version.outputs.VERSION }}" > VERSION
          uv run scripts/set-version.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build and test
        run: make check && make test && make build

      - name: Publish to npm
        working-directory: packages/typescript
        run: |
          if npm view @waves_man/cn-area@${{ steps.version.outputs.VERSION }} > /dev/null 2>&1; then
            echo "Version ${{ steps.version.outputs.VERSION }} already exists on npm, skipping"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to PyPI
        working-directory: packages/python
        run: |
          uv sync
          uv build
          uv run twine upload dist/* || echo "Version may already exist on PyPI"
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      - name: Create Go tag
        run: |
          git tag go/${{ github.ref_name }}
          git push origin go/${{ github.ref_name }}
